<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Educational Wallet</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:#fff;
}

/* MOBILE FIT */
.container{
  width:95%;
  max-width:400px;
  background:#111;
  padding:18px;
  border-radius:16px;
  box-shadow:0 0 40px rgba(0,255,200,.2);
}

/* LOGIN ROLL */
.login-animate{
  animation:loginRoll 0.7s ease;
}
@keyframes loginRoll{
  from{transform:translateY(50px) rotate(5deg);opacity:0}
  to{transform:translateY(0);opacity:1}
}

/* DASHBOARD GLOW */
.glow{
  animation:glow 2s infinite alternate;
}
@keyframes glow{
  from{box-shadow:0 0 10px #1abc9c}
  to{box-shadow:0 0 30px #1abc9c}
}

/* GAS GLOW */
.gas-glow{
  animation:gasGlow 1s infinite alternate;
}
@keyframes gasGlow{
  from{text-shadow:0 0 5px #2ecc71}
  to{text-shadow:0 0 15px #2ecc71,0 0 25px #2ecc71}
}

/* FLOATING DASHBOARD EFFECT */
.float{
  animation:float 3s ease-in-out infinite;
}
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
  100%{transform:translateY(0)}
}

.hidden{display:none}

.card{
  background:#1e1e1e;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
}

.row{
  display:flex;
  justify-content:space-between;
}

.green{color:#2ecc71}
.red{color:#e74c3c}

input,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
}

input{
  background:#222;
  color:#fff;
}

button{
  background:#1abc9c;
  font-weight:bold;
}

/* CLICK ROLL */
button:active{
  transform:scale(.95) rotate(3deg);
}

/* PAGE TRANSITION */
.roll{
  animation:pageRoll .5s ease;
}
@keyframes pageRoll{
  from{transform:translateX(100%);opacity:0}
  to{transform:translateX(0);opacity:1}
}

/* TICKER */
.ticker{
  overflow:hidden;
  white-space:nowrap;
}
.ticker span{
  display:inline-block;
  padding-left:100%;
  animation:ticker 12s linear infinite;
}
@keyframes ticker{
  0%{transform:translateX(0)}
  100%{transform:translateX(-100%)}
}

/* PROGRESS */
.progress{
  height:10px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:#1abc9c;
  transition:.5s;
}

.status{
  font-size:12px;
  color:#aaa;
  margin-top:8px;
}

.tx{
  padding:10px 0;
  border-bottom:1px solid #333;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container login-animate" id="login">
<h2>TRUST INVESTMENT Wallet</h2>
<input placeholder="Email">
<input type="password" placeholder="Password">
<button onclick="go('dashboard')">Login</button>
</div>

<!-- DASHBOARD -->
<div class="container hidden glow float" id="dashboard">
<h2>GEORGE SMITH</h2>

<div class="card">
<div class="row">
<span>Main Balance</span>
<span id="mainBal" class="green">$293,000</span>
</div>

<div class="row">
<span>Gas Balance</span>
<span id="gasBal" class="red gas-glow" onclick="gasClick()">$400</span>
</div>
</div>

<!-- MOVING TICKER -->
<div class="card ticker">
<span>
Next Toll: $90• Time: 09:30 - 10:32 • Data: 0.03 ETH • Next Toll: $880 • Time: 09:45-9:39 • Data: 0.05 ETH
</span>
</div>

<button onclick="go('withdraw')">Withdraw</button>

<div class="card">
<strong>Transactions</strong>
<div id="txList">
<div class="tx" onclick="viewTx('$90 CREDIT')">+$90 CREDIT 03/29/2026</div>
<div class="tx" onclick="viewTx('-$90 CREDIT')">+$90 CREDIT 03/28/2026</div>
</div>
</div>
</div>

<!-- WITHDRAW -->
<div class="container hidden" id="withdraw">
<h2>Withdraw</h2>
<input id="wAmount" placeholder="Amount">
<button onclick="startBlockchain()">Send</button>
<button onclick="go('dashboard')">Cancel</button>
</div>

<!-- BLOCKCHAIN -->
<div class="container hidden" id="blockchain">
<h2>Blockchain Confirmation</h2>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="status" id="status">Initializing...</div>
</div>

<!-- DETAILS -->
<div class="container hidden" id="details">
<h2 id="dTitle"></h2>
<div class="card">
<p id="dContent"></p>
</div>
<button onclick="go('dashboard')">Back</button>
</div>

<script>
function go(id){
document.querySelectorAll('.container').forEach(c=>c.classList.add('hidden'));
const page=document.getElementById(id);
page.classList.remove('hidden');
page.classList.add('roll');
setTimeout(()=>page.classList.remove('roll'),500);
}

/* GAS */
function gasClick(){
openDetails("Gas System",
"Next Toll: $880\nTime: 09:30\nData: 0.03 ETH");
}

/* TX */
function viewTx(data){
openDetails("Transaction", data + "\nStatus: Completed");
}

/* DETAILS */
function openDetails(title,content){
document.getElementById('dTitle').innerText=title;
document.getElementById('dContent').innerText=content;
go('details');
}

/* BLOCKCHAIN */
function startBlockchain(){
go('blockchain');

let progress=0;
const bar=document.getElementById('bar');
const status=document.getElementById('status');

const stages=[
"Connecting...",
"Broadcasting...",
"Verifying...",
"Confirming...",
"Completed"
];

let i=0;

const interval=setInterval(()=>{
progress+=20;
bar.style.width=progress+"%";
status.innerText=stages[i];
i++;

if(progress>=100){
clearInterval(interval);
setTimeout(()=>{
mainBal.innerText="$0.00";
go('dashboard');
},800);
}

},900);
}
</script>

</body>
</html>
